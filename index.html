<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Checkers</title>
</head>
<body>

<h2 id="game-status">Сделайте ход</h2>

<div id="board"></div>

<script>
const WEBHOOK_URL = "https://artpashaai.app.n8n.cloud/webhook-test/checkers-ui"; // ← вставь сюда

const userId = 400783020;

let board = [
  [0,1,0,1],
  [1,0,1,0],
  [0,0,0,0],
  [2,0,2,0]
];

function renderBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((row, i) => {
    const rowDiv = document.createElement("div");

    row.forEach((cell, j) => {
      const btn = document.createElement("button");
      btn.style.width = "60px";
      btn.style.height = "60px";

      if (cell === 1) btn.innerText = "⚪";
      else if (cell === 2) btn.innerText = "⚫";

      btn.onclick = () => handleClick(i, j, cell);

      rowDiv.appendChild(btn);
    });

    boardDiv.appendChild(rowDiv);
  });
}

async function handleClick(row, col, cellValue) {
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        user_id: userId,
        row,
        col,
        cell: {
          type: cellValue === 0 ? "empty" : "piece",
          owner: cellValue === 1 ? "me" : cellValue === 2 ? "enemy" : null
        }
      })
    });

    const data = await res.json();
    showMessage(data.message);

  } catch (e) {
    showMessage("❌ Ошибка соединения");
    console.error(e);
  }
}

function showMessage(text) {
  document.getElementById("game-status").innerText = text;
}

renderBoard();
</script>

</body>
</html>
