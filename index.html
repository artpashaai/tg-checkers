<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Checkers</title>
</head>
<body>

<h2 id="game-status">Сделайте ход</h2>

<div id="board"></div>

<script>
const WEBHOOK_URL = "https://YOUR_N8N_WEBHOOK_URL"; // ← ВСТАВЬ СЮДА

const userId = 400783020;

// пример доски (0 = пусто, 1 = ты, 2 = враг)
let board = [
  [0,1,0,1],
  [1,0,1,0],
  [0,0,0,0],
  [2,0,2,0]
];

function renderBoard() {
  const boardDiv = document.getElementById("board");
  boardDiv.innerHTML = "";

  board.forEach((row, i) => {
    const rowDiv = document.createElement("div");

    row.forEach((cell, j) => {
      const cellDiv = document.createElement("button");

      cellDiv.style.width = "50px";
      cellDiv.style.height = "50px";

      if (cell === 1) cellDiv.innerText = "⚪";
      else if (cell === 2) cellDiv.innerText = "⚫";

      cellDiv.onclick = () => handleClick(i, j, cell);

      rowDiv.appendChild(cellDiv);
    });

    boardDiv.appendChild(rowDiv);
  });
}

async function handleClick(row, col, cellValue) {
  const data = {
    user_id: userId,
    row,
    col,
    cell: {
      type: cellValue === 0 ? "empty" : "piece",
      owner: cellValue === 1 ? "me" : cellValue === 2 ? "enemy" : null
    }
  };

  const res = await fetch(WEBHOOK_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  const json = await res.json();

  showMessage(json.message);
}

function showMessage(text) {
  document.getElementById("game-status").innerText = text;
}

renderBoard();
</script>

</body>
</html>
