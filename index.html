<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #222; color: white; }
        #board { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); border: 2px solid #555; }
        .cell { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .black { background-color: #769656; }
        .white { background-color: #eeeed2; }
        .checker { width: 30px; height: 30px; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .red-checker { background: #cc0000; }
    </style>
</head>
<body>

<div id="board"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Разворачиваем на весь экран

    const boardElement = document.getElementById('board');
    const webhookUrl = 'https://artpashaai.app.n8n.cloud/workflow/CUnuYZAR1gleHa16/webhook/checkers-move'; // Ваш URL

    // Создаем доску 8x8
    for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
            const cell = document.createElement('div');
            cell.className = `cell ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
            
            // Добавляем тестовую шашку на черные клетки первых рядов
            if ((r + c) % 2 !== 0 && r < 3) {
                const checker = document.createElement('div');
                checker.className = 'checker red-checker';
                cell.appendChild(checker);
            }

            cell.onclick = () => sendMove(r, c);
            boardElement.appendChild(cell);
        }
    }

    async function sendMove(row, col) {
        const data = {
            user_id: tg.initDataUnsafe.user?.id || 12345, // ID пользователя из Telegram
            move: { row: row, col: col },
            callback_query_id: tg.initDataUnsafe.query_id // Важно для ответа через answerCallbackQuery
        };

        try {
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                console.log('Данные отправлены');
            }
        } catch (error) {
            console.error('Ошибка отправки:', error);
        }
    }
</script>
</body>
</html>
